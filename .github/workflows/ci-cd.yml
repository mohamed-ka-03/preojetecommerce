name: CI/CD E-Commerce Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  # LINTING (Vérification de la qualité du code)

  lint:
    name: ✨ Lint Codebase
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Lint Backend (Python)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Backend Linters
        run: |
          pip install flake8
          
      - name: Run Flake8 (Python Linter)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 ./backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Lint Frontend (Node/Next.js)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Frontend Dependencies
        run: |
          cd frontend && npm ci
          
      - name: Run Next.js Lint
        run: |
          cd frontend && npm run lint

 
  # TESTS (Exécution des tests automatisés)

  test:
    name: 🧪 Run Automated Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Tests Backend Django
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Backend Dependencies
        run: |
          pip install -r backend/requirements.txt
          
      - name: Run Django Tests
        run: |
          cd backend && python manage.py test --noinput
        env:
          # On passe des variables fictives pour que Django puisse s'initialiser sans Postgres pour les tests CI
          SECRET_KEY: "ci-test-secret-key"
          DEBUG: "True"
  
  # DOCKER BUILD (Vérification de la compilation Docker)

  build-docker:
    name: 🐳 Verify Docker Builds
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image (Dry Run)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infrastructure/docker/backend/Dockerfile
          push: false # Ne pousse pas sur un registre, on teste juste le build

      - name: Build Frontend Image (Dry Run)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./infrastructure/docker/frontend/Dockerfile
          push: false