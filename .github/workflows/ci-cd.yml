name: CI

on:
  push:
    branches:
      - develop
      - main

  pull_request:

jobs:

  backend:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Django tests
        run: |
          cd backend
          python manage.py test

  frontend:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Next.js
        run: |
          cd frontend
          npm run build