services:
  nginx:
    image: nginx:alpine
    container_name: bs_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bs_frontend_prod
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: bs_backend_prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - ./env/.env.prod
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: bs_postgres_prod
    env_file:
      - ./env/.env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bs_redis_prod
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: bs_prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: bs_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_prod_data:
  grafana_data: