services:
  frontend:
    build: ./frontend
    container_name: bs_frontend_staging
    environment:
      - NODE_ENV=staging
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: bs_backend_staging
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - ./env/.env.staging
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    container_name: bs_postgres_staging
    restart: always
    env_file:
      - ./env/.env.staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bs_redis_staging

volumes:
  postgres_staging_data: