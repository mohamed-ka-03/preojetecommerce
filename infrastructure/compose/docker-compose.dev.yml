services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infrastructure/docker/frontend/Dockerfile # <-- CORRIGÉ
    container_name: bs_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/backend/Dockerfile # <-- CORRIGÉ
    container_name: bs_backend
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ../../backend:/app
    env_file:
      - ../../.env.dev
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    container_name: bs_postgres
    restart: always
    env_file:
      - ../../.env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bs_redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: bs_nginx
    ports:
      - "80:80"             
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Monte le fichier en lecture seule
    depends_on:
      - frontend
      - backend

volumes:
  postgres_dev_data: