services:
  frontend:
    build: ../../frontend
    container_name: bs_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../docker/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build: ../../backend
    container_name: bs_backend
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ../docker/backend:/app
    env_file:
      - ../../.env.dev
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    container_name: bs_postgres
    restart: always
    env_file:
      - ../../.env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bs_redis
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data: